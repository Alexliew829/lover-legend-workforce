<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payroll System - Worker</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../assets/icons/payroll-system.ico?v=1.81.1" />
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png?v=1.81.1" />
  <link rel="stylesheet" href="../css/style.css?v=1.81.1" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="back" href="index.html">←</a>
      <div class="page-title">工人管理</div>
    </div>

    <div id="status" class="status"></div>

    <section class="card">
      <form id="workerForm" class="form">
        <input type="hidden" name="workerNo" />

        <label>公司</label>
        <select name="company" required>
          <option value="">选择公司</option>
          <option>Lover Legend Adenium</option>
          <option>Lover Legend Gardening</option>
        </select>

        <label>工人名字</label>
        <input
          name="name"
          list="workerNameList"
          maxlength="20"
          required
          placeholder="输入或选择工人名字" />
        <datalist id="workerNameList"></datalist>

        <label>电话</label>
        <input name="phone" placeholder="可以跳过" />

        <label>IC / Passport</label>
        <input name="ic" placeholder="可以跳过" />

        <div class="field-row">
          <div class="field-group compact-field">
            <label>薪水类型</label>
            <select name="salaryType" required>
              <option value="">选择</option>
              <option>日薪</option>
              <option>月薪</option>
            </select>
          </div>

          <div class="field-group">
            <label id="salaryAmountLabel">薪水 RM</label>
            <input name="salaryAmount" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>

        <label>入职日期</label>
        <div class="date-select-row" style="display:flex; gap:8px;">
          <select name="joinDay" style="flex:1;">
            <option value="">日</option>
          </select>

          <select name="joinMonth" style="flex:1;">
            <option value="">月</option>
          </select>

          <select name="joinYear" style="flex:1.3;">
            <option value="">年</option>
          </select>
        </div>

        <label>备注</label>
        <textarea name="remark" rows="2" placeholder="可以跳过"></textarea>

        <button id="saveWorkerBtn" class="btn" type="submit">保存工人</button>

        <button
          id="resignWorkerBtn"
          class="btn secondary"
          type="button"
          style="display:none; margin-top:10px;">
          办理离职
        </button>
      </form>
    </section>

    <section class="card">
      <div id="workerList" class="list"></div>
    </section>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js?v=1.81.1"></script>
  <script src="../js/format.js"></script>
  <script src="../js/worker.js?v=1.81.1"></script>
  <script src="../js/app.js?v=1.81.1"></script>
</body>
</html>
