<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payroll System - Payslip</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../assets/icons/payroll-system.ico?v=1.84" />
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png?v=1.84" />
  <link rel="stylesheet" href="../css/style.css?v=1.84" />
</head>
<body>
  <div class="app payslip-app">
    <div class="topbar no-print">
      <a class="back" href="payroll.html">←</a>
      <div class="page-title">工资单 / Payslip</div>
    </div>

    <div id="payslipStatus" class="status no-print">正在载入工资单… / Loading payslip…</div>

    <main id="payslipPaper" class="payslip-paper payslip-two-copy" hidden>
      <section class="payslip-copy" data-copy="employee">
        <div class="payslip-copy-label">SALINAN PEKERJA / EMPLOYEE COPY</div>
        <div class="payslip-copy-content"></div>
      </section>

      <div class="payslip-cut-line">
        <span>✂ POTONG DI SINI / CUT HERE</span>
      </div>

      <section class="payslip-copy" data-copy="company">
        <div class="payslip-copy-label">SALINAN SYARIKAT / COMPANY COPY</div>
        <div class="payslip-copy-content"></div>
        <div class="payslip-acknowledgement">
          Saya mengesahkan bahawa saya telah menerima gaji bagi bulan ini sepenuhnya.<br />
          I confirm that I have received this month's salary in full.
        </div>
      </section>
    </main>

    <button id="printPayslipBtn" class="btn no-print" type="button" hidden>打印工资单 / Print Payslip</button>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/payslip.js?v=1.84"></script>
  <script src="../js/app.js?v=1.84"></script>
</body>
</html>
