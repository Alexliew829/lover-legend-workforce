<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payroll System - Dashboard</title>
  <link rel="manifest" href="../manifest.json?v=1.88" />
  <link rel="icon" href="../assets/icons/payroll-system.ico?v=1.88" />
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png?v=1.88" />
  <link rel="stylesheet" href="../css/style.css?v=1.88" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="back" href="index.html">←</a>
      <div class="page-title">Dashboard / 总览</div>
    </div>

    <div id="status" class="status">正在读取 Dashboard...</div>

    <section class="card dashboard-period-card">
      <label>月份 / Month</label>
      <div class="field-row month-year-row">
        <div class="field-group">
          <select id="dashboardMonth" aria-label="月份"></select>
        </div>
        <div class="field-group">
          <select id="dashboardYear" aria-label="年份"></select>
        </div>
      </div>
    </section>

    <section id="dashboard" class="dashboard-grid">
      <div class="dashboard-loading">正在载入资料...</div>
    </section>

    <section class="card">
      <div class="section-title dashboard-section-title">快捷功能 / Quick Access</div>
      <div class="dashboard-actions">
        <a class="dashboard-action" href="worker.html">👷<span>工人管理</span></a>
        <a class="dashboard-action" href="advance.html">💰<span>欠款管理</span></a>
        <a class="dashboard-action" href="payroll.html">🧮<span>Payroll</span></a>
        <a class="dashboard-action" href="index.html">🏠<span>首页</span></a>
      </div>
    </section>

    <section class="card">
      <div class="section-title dashboard-section-title">系统维护 / System Maintenance</div>
      <p class="field-hint maintenance-hint">
        建议在年底结转前先下载年度备份。工人资料会保留，未还欠款会自动结转。
      </p>

      <div class="maintenance-actions">
        <button id="yearlyBackupBtn" class="btn secondary maintenance-btn" type="button">
          💾 年度备份 / Backup
        </button>

        <button id="restoreBackupBtn" class="btn secondary maintenance-btn" type="button">
          ♻ Restore / 恢复
        </button>

        <button id="yearEndCloseBtn" class="btn danger maintenance-btn" type="button">
          ⚠ 年底结转 / Year-End Closing
        </button>
      </div>

      <input id="restoreBackupFile" type="file" accept=".json,application/json" hidden />
      <div id="maintenanceStatus" class="status"></div>
    </section>
  </div>

  <script src="../js/config.js?v=1.88"></script>
  <script src="../js/api.js?v=1.88"></script>
  <script src="../js/dashboard.js?v=1.88"></script>
</body>
</html>
