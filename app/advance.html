<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payroll System - Advance</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../assets/icons/payroll-system.ico?v=1.85" />
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png?v=1.85" />
  <link rel="stylesheet" href="../css/style.css?v=1.85" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="back" href="index.html">←</a>
      <div class="page-title">欠款管理</div>
    </div>

    <div id="status" class="status">欠款管理 V1.85</div>

    <section class="card">
      <form id="advanceForm" class="form">
        <label>公司</label>
        <select name="company" required>
          <option value="">选择公司</option>
          <option>Lover Legend Adenium</option>
          <option>Lover Legend Gardening</option>
        </select>

        <div class="field-row worker-project-row">
          <div class="field-group">
            <label>工人</label>
            <select name="workerNo" required>
              <option value="">先选择公司</option>
            </select>
          </div>

          <div class="field-group compact-field">
            <label>项目</label>
            <select name="type" required>
              <option selected>支粮</option>
              <option>缺席</option>
              <option>准证</option>
            </select>
          </div>
        </div>

        <label>日期</label>
        <div class="date-select-row" style="display:flex; gap:8px;">
          <select name="deductDay" style="flex:1;"><option value="">日</option></select>
          <select name="deductMonth" style="flex:1;"><option value="">月</option></select>
          <select name="deductYear" style="flex:1.3;"><option value="">年</option></select>
        </div>

        <label>金额 RM</label>
        <input name="amount" type="text" inputmode="decimal" placeholder="0.00" required />
        <div id="absenceHint" class="field-hint" style="display:none;">缺席金额按该工人一天薪水自动计算。</div>

        <label>备注</label>
        <textarea name="remark" rows="2" placeholder="可以跳过"></textarea>

        <button id="saveAdvanceBtn" class="btn" type="submit">保存记录</button>
      </form>
    </section>

    <section class="card">
      <div id="advanceList" class="list"></div>
    </section>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js?v=1.85"></script>
  <script src="../js/advance.js?v=1.85"></script>
  <script src="../js/app.js?v=1.85"></script>
</body>
</html>
